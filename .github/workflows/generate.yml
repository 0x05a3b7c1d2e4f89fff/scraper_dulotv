name: Generate Dulo TV Playlist & EPG

on:
  schedule:
    # Every 4 hours — keeps tokenised stream URLs fresh
    - cron: "0 */4 * * *"
  workflow_dispatch:   # allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests cloudscraper

      - name: Run generator
        run: python generate.py

      - name: Commit & push outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dulo.m3u dulo.xml.gz
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: refresh playlist & EPG [$(date -u '+%Y-%m-%d %H:%M UTC')]" && \
            git push
